receivers:
  # OTLP 接收器（采集追踪/指标/日志）
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Prometheus 指标采集
  prometheus:
    config:
      global:
        scrape_interval: 60s
      scrape_configs:
        - job_name: otel-collector
          static_configs:
          - targets:
              - localhost:8888
            labels:
              job_name: otel-collector

processors:
  # 过滤 health check spans
  filter/health:
    traces:
      span:
        - 'name == "GET /health"'
        - 'name == "GET /healthz"'
        - 'name == "GET /ready"'
        - 'name == "GET /readyz"'
        - 'name == "GET /livez"'
  # 保留原有批量处理器
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s
  # 保留原有资源检测处理器
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
  #    新增：从日志 body 中提取 trace_id/span_id 到 attributes   
  transform/logs:
    log_statements:
      - context: log
        statements:
          # trace 关联 
          - set(attributes["trace_id"], ParseJSON(body)["trace_id"]) where IsString(body)
          - set(attributes["span_id"], ParseJSON(body)["span_id"]) where IsString(body)
          - set(attributes["trace_id"], body["trace_id"]) where IsMap(body)
          - set(attributes["span_id"], body["span_id"]) where IsMap(body)

          # ===== severity 提取到 OTLP 标准字段 =====
          - set(severity_text, ParseJSON(body)["severity_text"]) where IsString(body)
          - set(severity_text, body["severity_text"]) where IsMap(body)
          # 归一化大写为小写（DotAI 输出 INFO/ERROR，统一为 info/error）
          - set(severity_text, "debug") where severity_text == "DEBUG"
          - set(severity_text, "info") where severity_text == "INFO"
          - set(severity_text, "warn") where severity_text == "WARN" or severity_text == "WARNING"
          - set(severity_text, "error") where severity_text == "ERROR"
          - set(severity_text, "fatal") where severity_text == "FATAL"
          # 设置 severity_number
          - set(severity_number, SEVERITY_NUMBER_DEBUG) where severity_text == "debug"
          - set(severity_number, SEVERITY_NUMBER_INFO) where severity_text == "info"
          - set(severity_number, SEVERITY_NUMBER_WARN) where severity_text == "warn" or severity_text == "warning"
          - set(severity_number, SEVERITY_NUMBER_ERROR) where severity_text == "error"
          - set(severity_number, SEVERITY_NUMBER_FATAL) where severity_text == "fatal"

          # ===== 告警字段 =====
          - set(attributes["alert"], ParseJSON(body)["alert"]) where IsString(body)
          - set(attributes["expected"], ParseJSON(body)["expected"]) where IsString(body)
          - set(attributes["alert"], body["alert"]) where IsMap(body)
          - set(attributes["expected"], body["expected"]) where IsMap(body)

          #   服务/环境（提升到 resource 级别，SigNoz Service Name 筛选器需要）
          - set(resource.attributes["service.name"], ParseJSON(body)["service_name"]) where IsString(body) and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], body["service_name"]) where IsMap(body) and resource.attributes["service.name"] == nil
          - set(attributes["service.name"], ParseJSON(body)["service.name"]) where IsString(body)
          - set(attributes["service_name"], ParseJSON(body)["service_name"]) where IsString(body)
          - set(attributes["env"], ParseJSON(body)["env"]) where IsString(body)
          - set(attributes["request_id"], ParseJSON(body)["request_id"]) where IsString(body)
          - set(attributes["service.name"], body["service.name"]) where IsMap(body)
          - set(attributes["service_name"], body["service_name"]) where IsMap(body)
          - set(attributes["env"], body["env"]) where IsMap(body)
          - set(attributes["request_id"], body["request_id"]) where IsMap(body)

          #   HTTP 请求  
          - set(attributes["method"], ParseJSON(body)["method"]) where IsString(body)
          - set(attributes["path"], ParseJSON(body)["path"]) where IsString(body)
          - set(attributes["status_code"], ParseJSON(body)["status_code"]) where IsString(body)
          - set(attributes["latency"], ParseJSON(body)["latency"]) where IsString(body)
          - set(attributes["is_stream"], ParseJSON(body)["is_stream"]) where IsString(body)
          - set(attributes["client_ip"], ParseJSON(body)["client_ip"]) where IsString(body)
          - set(attributes["log_source"], ParseJSON(body)["log_source"]) where IsString(body)
          - set(attributes["method"], body["method"]) where IsMap(body)
          - set(attributes["path"], body["path"]) where IsMap(body)
          - set(attributes["status_code"], body["status_code"]) where IsMap(body)
          - set(attributes["latency"], body["latency"]) where IsMap(body)
          - set(attributes["is_stream"], body["is_stream"]) where IsMap(body)
          - set(attributes["client_ip"], body["client_ip"]) where IsMap(body)
          - set(attributes["log_source"], body["log_source"]) where IsMap(body)

          #   Tool/Agent 业务  
          - set(attributes["tool"], ParseJSON(body)["tool"]) where IsString(body)
          - set(attributes["ref"], ParseJSON(body)["ref"]) where IsString(body)
          - set(attributes["tool_name"], ParseJSON(body)["tool_name"]) where IsString(body)
          - set(attributes["tool_ref"], ParseJSON(body)["tool_ref"]) where IsString(body)
          - set(attributes["session_id"], ParseJSON(body)["session_id"]) where IsString(body)
          - set(attributes["agent_name"], ParseJSON(body)["agent_name"]) where IsString(body)
          - set(attributes["dedupe_key"], ParseJSON(body)["dedupe_key"]) where IsString(body)
          - set(attributes["tool"], body["tool"]) where IsMap(body)
          - set(attributes["ref"], body["ref"]) where IsMap(body)
          - set(attributes["tool_name"], body["tool_name"]) where IsMap(body)
          - set(attributes["tool_ref"], body["tool_ref"]) where IsMap(body)
          - set(attributes["session_id"], body["session_id"]) where IsMap(body)
          - set(attributes["agent_name"], body["agent_name"]) where IsMap(body)
          - set(attributes["dedupe_key"], body["dedupe_key"]) where IsMap(body)

          # ===== 业务观测字段 (biz_outcome / gateway / platform) =====
          - set(attributes["api_name"], ParseJSON(body)["api_name"]) where IsString(body)
          - set(attributes["module"], ParseJSON(body)["module"]) where IsString(body)
          - set(attributes["success"], ParseJSON(body)["success"]) where IsString(body)
          - set(attributes["error_type"], ParseJSON(body)["error_type"]) where IsString(body)
          - set(attributes["user_id"], ParseJSON(body)["user_id"]) where IsString(body)
          - set(attributes["api_name"], body["api_name"]) where IsMap(body)
          - set(attributes["module"], body["module"]) where IsMap(body)
          - set(attributes["success"], body["success"]) where IsMap(body)
          - set(attributes["error_type"], body["error_type"]) where IsMap(body)
          - set(attributes["user_id"], body["user_id"]) where IsMap(body)

          # ===== 网关观测字段 (gateway outcome) =====
          - set(attributes["model_name"], ParseJSON(body)["model_name"]) where IsString(body)
          - set(attributes["channel_id"], ParseJSON(body)["channel_id"]) where IsString(body)
          - set(attributes["channel_name"], ParseJSON(body)["channel_name"]) where IsString(body)
          - set(attributes["use_channel"], ParseJSON(body)["use_channel"]) where IsString(body)
          - set(attributes["retry_count"], ParseJSON(body)["retry_count"]) where IsString(body)
          - set(attributes["fallback_triggered"], ParseJSON(body)["fallback_triggered"]) where IsString(body)
          - set(attributes["frt_ms"], ParseJSON(body)["frt_ms"]) where IsString(body)
          - set(attributes["prompt_tokens"], ParseJSON(body)["prompt_tokens"]) where IsString(body)
          - set(attributes["completion_tokens"], ParseJSON(body)["completion_tokens"]) where IsString(body)
          - set(attributes["group"], ParseJSON(body)["group"]) where IsString(body)
          - set(attributes["model_name"], body["model_name"]) where IsMap(body)
          - set(attributes["channel_id"], body["channel_id"]) where IsMap(body)
          - set(attributes["channel_name"], body["channel_name"]) where IsMap(body)
          - set(attributes["use_channel"], body["use_channel"]) where IsMap(body)
          - set(attributes["retry_count"], body["retry_count"]) where IsMap(body)
          - set(attributes["fallback_triggered"], body["fallback_triggered"]) where IsMap(body)
          - set(attributes["frt_ms"], body["frt_ms"]) where IsMap(body)
          - set(attributes["prompt_tokens"], body["prompt_tokens"]) where IsMap(body)
          - set(attributes["completion_tokens"], body["completion_tokens"]) where IsMap(body)
          - set(attributes["group"], body["group"]) where IsMap(body)
  # 保留原有 Span 指标处理器
  signozspanmetrics/delta:
    metrics_exporter: signozclickhousemetrics
    metrics_flush_interval: 60s
    latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s ]
    dimensions_cache_size: 100000
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    enable_exp_histogram: true
    dimensions:
      - name: service.namespace
        default: default
      - name: deployment.environment
        default: default
      - name: signoz.collector.id
      - name: service.version
      - name: browser.platform
      - name: browser.mobile
      - name: k8s.cluster.name
      - name: k8s.node.name
      - name: k8s.namespace.name
      - name: host.name
      - name: host.type
      - name: container.name
  # 注意：SigNoz 会自动从 attributes.trace_id/span_id 关联 Trace，无需额外 processor

extensions:
  # 保留原有扩展
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

exporters:
  # 保留原有追踪输出器
  clickhousetraces:
    datasource: tcp://clickhouse:9000/signoz_traces
    low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
    use_new_schema: true
  # 保留原有指标输出器
  signozclickhousemetrics:
    dsn: tcp://clickhouse:9000/signoz_metrics
  # 保留原有日志输出器（调整名称适配）
  clickhouselogsexporter:
    dsn: tcp://clickhouse:9000/signoz_logs
    timeout: 10s
    use_new_schema: true

service:
  telemetry:
    logs:
      encoding: json
  extensions:
    - health_check
    - pprof
  pipelines:
    # 保留原有追踪管道
    traces:
      receivers: [otlp]
      processors: [filter/health, signozspanmetrics/delta, batch]
      exporters: [clickhousetraces]
    # 保留原有指标管道
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signozclickhousemetrics]
    # 保留原有 Prometheus 指标管道
    metrics/prometheus:
      receivers: [prometheus]
      processors: [batch]
      exporters: [signozclickhousemetrics]
    # 日志管道
    logs:
      receivers: [otlp]
      processors: [transform/logs, batch]
      exporters: [clickhouselogsexporter]
